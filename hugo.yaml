baseURL: "https://cat.fjh1997.top/"
title: "猫猫鱼的小窝"
theme: "reimu"
languageCode: "zh-CN"
defaultContentLanguage: "zh-cn"
timeZone: "Asia/Shanghai"
hasCJKLanguage: true
buildFuture: true
enableRobotsTXT: false
enableGitInfo: false
summaryLength: 70

pagination:
  pagerSize: 10

frontmatter:
  lastmod:
    - lastmod
    - updated
    - date

taxonomies:
  category: categories
  tag: tags

outputs:
  home:
    - HTML
    - RSS
    - JSON

outputFormats:
  RSS:
    mediaType: application/rss+xml
    baseName: atom
  JSON:
    mediaType: application/json
    baseName: search
    isPlainText: true
    notAlternative: true

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    lineNos: true
    guessSyntax: false
    tabWidth: 4

params:
  title: "猫猫鱼的小窝"
  mainSections:
    - posts
  author: "catcatyu"
  description: "猫猫鱼的技术博客，分享 Linux、安全、Docker、网络、逆向工程等技术文章"
  keywords:
    - Linux
    - 安全
    - Docker
    - 网络
    - 逆向工程
    - CTF
    - Python
    - 技术博客
  subtitle:
    typing:
      enable: false
    text: "catcatyu home page"
  menu:
    - name: home
      url: ""
      icon:
    - name: archives
      url: "archives"
      icon:
    - name: about
      url: "about"
      icon:
    - name: friend
      url: "friend"
      icon:
  banner: "/images/blue.webp"
  avatar: "avatar.webp"
  toc: true
  open_graph:
    enable: true
    options:
      twitter_card: summary_large_image
  excerpt_link: "Read More"
  footer:
    since: 2020
    powered: true
    count: true
    busuanzi: true
    icon:
      url: "../images/taichi.png"
      rotate: true
      mask: true
  sidebar:
    position: right
    menu: true
    article:
      show_common: true
  social:
    github: "https://github.com/fjh1997"
    bilibili: "https://space.bilibili.com/33827572"
    zhihu: "https://www.zhihu.com/people/fjh1997"
  widgets: []
  show_update_time: false
  rss:
    limit: 50
    showFullContent: true
    showCopyright: false
  sort_order:
    taxonomy:
      category: date-reverse
      tag: date-reverse
    archive: date-reverse
    home: default
  paginate:
    archive: 10
    post: 10
  reimu_cursor:
    enable: true
    cursor:
      default: "../images/cursor/reimu-cursor-default.png"
      pointer: "../images/cursor/reimu-cursor-pointer.png"
      text: "../images/cursor/reimu-cursor-text.png"
  icon_font: "4552607_4k4bc36ef96"
  font:
    enable: true
    article:
      - Mulish
      - Noto Serif SC
  local_font:
    article:
      - "-apple-system"
      - PingFang SC
      - Microsoft YaHei
      - sans-serif
    code:
      - Menlo
      - Monaco
      - Consolas
      - monospace
  dark_mode:
    enable: auto
  material_theme:
    enable: false
  internal_theme:
    light:
      --red-0: "#0078d7"
      --red-1: "#009bff"
      --red-2: "#36b7ff"
      --red-3: "#81d4ff"
      --red-4: "#b9e8ff"
      --red-5: "#e1f5ff"
      --red-5-5: "#eefaff"
      --red-6: "#f6fcff"
      --color-red-6-shadow: "rgba(0, 155, 255, 0.45)"
      --color-red-3-shadow: "rgba(0, 155, 255, 0.25)"
    dark:
      --red-0: "#36b7ff"
      --red-1: "#36b7ff"
      --red-2: "#81d4ff"
      --red-3: "#9edfff"
      --red-4: "rgba(129, 212, 255, 0.5)"
      --red-5: "rgba(54, 183, 255, 0.15)"
      --red-5-5: "rgba(54, 183, 255, 0.08)"
      --red-6: "rgba(54, 183, 255, 0.2)"
      --color-red-6-shadow: "rgba(0, 155, 255, 0.35)"
      --color-red-3-shadow: "rgba(0, 155, 255, 0.2)"
  mermaid:
    zoom: false
  code_block:
    expand: true
  clipboard:
    success:
      zh-CN: "复制成功 (*^▽^*)"
      en: "Copy successfully (*^▽^*)"
    fail:
      zh-CN: "复制失败 (ﾟ⊿ﾟ)ﾂ"
      en: "Copy failed (ﾟ⊿ﾟ)ﾂ"
    copyright:
      enable: false
      count: 50
      license_type: by-nc-sa
  baidu_analytics: "5da340ea9593c887a216551c55233b7d"
  google_analytics: "G-23KTRMMFYL"
  clarity: "v6glba4v65"
  comment:
    title:
      zh-CN: "说些什么吧！"
      en: "Leave a comment"
    default: utterances
  utterances:
    enable: true
    repo: "fjh1997/cat"
    issue_term: title
    theme: auto
  algolia_search:
    enable: false
  generator_search:
    enable: true
    field: post
    content: true
  preloader:
    enable: true
    text:
      zh-CN: "少女祈祷中..."
      en: "Loading..."
    rotate: true
  animation:
    enable: true
    options:
      header:
        title: slide-up
        subTitle: slide-down
      home:
        post: fade-up
        widget: fade-up
        sidebar: fade-up
      article:
        whole: fade-up
        date: zoom-in
        category: zoom-in
        tag: zoom-in
        comment: zoom-in
        reading: zoom-in
        nav: fade-up
      archive:
        whole: fade-up
        tag: zoom-in
        category: zoom-in
        section: fade-up
        nav: fade-up
  firework:
    enable: true
    disable_on_mobile: false
    options:
      excludeElements:
        - a
        - button
      particles:
        - shape: circle
          move:
            - emit
          easing: easeOutExpo
          colors:
            - "var(--red-1)"
            - "var(--red-2)"
            - "var(--red-3)"
            - "var(--red-4)"
          number: 20
          duration:
            - 1200
            - 1800
          shapeOptions:
            radius:
              - 16
              - 32
            alpha:
              - 0.3
              - 0.5
        - shape: circle
          move:
            - diffuse
          easing: easeOutExpo
          colors:
            - "var(--red-0)"
          number: 1
          duration:
            - 1200
            - 1800
          shapeOptions:
            radius: 20
            alpha:
              - 0.2
              - 0.5
            lineWidth: 6
  article_copyright:
    enable: true
    content:
      author: true
      link: true
      title: false
      date: false
      updated: false
      license: true
      license_type: by-nc-sa
  top:
    enable: true
    position: right
    icon:
      url: "../images/taichi.png"
      rotate: true
      mask: true
  quicklink:
    enable: true
    timeout: 3000
    priority: true
    ignores: []
  pace:
    enable: true
  injector:
    body_end: '<a href="https://app.pagescms.org/fjh1997/cat/main" target="_blank" rel="noopener nofollow" style="position:fixed;bottom:60px;left:16px;z-index:999;width:36px;height:36px;border-radius:50%;background:var(--red-2,#009bff);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,.15);opacity:.5;transition:opacity .2s" onmouseenter="this.style.opacity=1" onmouseleave="this.style.opacity=.5" title="管理后台">&#9998;</a>'
